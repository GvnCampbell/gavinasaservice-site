name: Fetch Feeds

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:          # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch YouTube + Podcast feeds
        run: |
          python3 - <<'EOF'
          import json, urllib.request, xml.etree.ElementTree as ET, re, sys
          from datetime import datetime, timezone

          def fetch_xml(url):
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as r:
                  return ET.parse(r)

          result = {}

          # ── YouTube ──────────────────────────────────────────────
          try:
              tree = fetch_xml("https://www.youtube.com/feeds/videos.xml?channel_id=UC6I1agrkvdtbxMjNtC8Daqg")
              root = tree.getroot()
              ns = {
                  "atom":  "http://www.w3.org/2005/Atom",
                  "yt":    "http://www.youtube.com/xml/schemas/2015",
                  "media": "http://search.yahoo.com/mrss/",
              }
              entry = root.find("atom:entry", ns)
              vid_id = entry.find("yt:videoId", ns).text
              title  = entry.find("atom:title", ns).text
              pub    = entry.find("atom:published", ns).text
              link   = entry.find("atom:link", ns).attrib.get("href")
              thumb  = f"https://img.youtube.com/vi/{vid_id}/maxresdefault.jpg"
              result["youtube"] = {
                  "videoId": vid_id,
                  "title":   title,
                  "link":    link,
                  "pubDate": pub,
                  "thumb":   thumb,
              }
              print(f"YouTube OK: {title}")
          except Exception as e:
              print(f"YouTube FAILED: {e}", file=sys.stderr)

          # ── Podcast ──────────────────────────────────────────────
          try:
              tree = fetch_xml("https://www.hometech.fm/shows?format=rss")
              root = tree.getroot()
              chan = root.find("channel")
              item = chan.find("item")
              itns = {"itunes": "http://www.itunes.com/dtds/podcast-1.0.dtd"}
              title = item.find("title").text
              link  = item.find("link").text
              pub   = item.find("pubDate").text
              desc_raw = item.find("description").text or ""
              desc = re.sub(r"<[^>]+>", "", desc_raw).strip()[:200]
              art_el = item.find("itunes:image", itns)
              art    = art_el.attrib.get("href") if art_el is not None else ""
              if not art:
                  ch_art = chan.find("itunes:image", itns)
                  art = ch_art.attrib.get("href") if ch_art is not None else ""
              result["podcast"] = {
                  "title":   title,
                  "link":    link,
                  "pubDate": pub,
                  "desc":    desc,
                  "artwork": art,
              }
              print(f"Podcast OK: {title}")
          except Exception as e:
              print(f"Podcast FAILED: {e}", file=sys.stderr)

          result["fetchedAt"] = datetime.now(timezone.utc).isoformat()

          with open("data/latest.json", "w") as f:
              json.dump(result, f, indent=2)
          print("Wrote data/latest.json")
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --cached --quiet || git commit -m "chore: update feed data [skip ci]"
          git push
